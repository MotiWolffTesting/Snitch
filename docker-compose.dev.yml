version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: snitch-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-snitch_db_dev}
      MYSQL_USER: ${MYSQL_USER:-snitch_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - snitch-network-dev
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: snitch-backend-dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=${MYSQL_DATABASE:-snitch_db_dev};Uid=${MYSQL_USER:-snitch_user};Pwd=${MYSQL_PASSWORD:-devpassword123};
      - Jwt__Key=${JWT_SECRET:-dev-secret-key-for-development-only-32-chars}
      - Jwt__Issuer=${JWT_ISSUER:-SnitchAPI}
      - Jwt__Audience=${JWT_AUDIENCE:-SnitchApp}
    ports:
      - "5001:80"
    depends_on:
      - mysql
    networks:
      - snitch-network-dev
    volumes:
      - ./backend:/app/src
      - /app/src/bin
      - /app/src/obj
    command: dotnet watch run --project /app/src --urls http://0.0.0.0:80

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: snitch-frontend-dev
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - snitch-network-dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    command: npm start

volumes:
  mysql_dev_data:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  snitch-network-dev:
    driver: bridge
